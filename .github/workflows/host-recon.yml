name: host-recon

# Read-only ground-truth dump of the live platform-apps deploy state, via the
# host runner (SSH is proxy-blocked). Used to verify exact compose service names,
# image: tags, and host-side Dockerfiles before generating per-repo deploy workflows.

on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: [self-hosted, tacticl-deploy]
    steps:
      - name: Dump live compose + image facts
        run: |
          set -uo pipefail
          cd /opt/cidadel
          echo "===== service -> image (resolved compose) ====="
          docker compose config --format json 2>/dev/null | python3 -c '
          import sys,json
          d=json.load(sys.stdin)
          for n,s in sorted(d.get("services",{}).items()):
              print(f"{n}\timage={s.get(\"image\",\"?\")}")
          ' 2>/dev/null || docker compose config 2>/dev/null | grep -nE "^  [a-zA-Z0-9_-]+:$|image:"
          echo ""
          echo "===== host-side Dockerfiles in /opt/cidadel ====="
          ls -1 /opt/cidadel/Dockerfile* 2>/dev/null || echo "(none)"
          echo ""
          echo "===== compose files present ====="
          ls -1 /opt/cidadel/docker-compose*.yml 2>/dev/null; ls -1 /opt/strategiz/docker-compose*.yml 2>/dev/null || true
          echo ""
          echo "===== running containers (name -> status -> image) ====="
          docker ps --format '{{.Names}}	{{.Status}}	{{.Image}}' | sort
          echo ""
          echo "===== local image tags for the products ====="
          docker images --format '{{.Repository}}:{{.Tag}}' | grep -iE 'cidadel|strategiz|pointstax|tacticl|marketiz|travl' | sort
          echo ""
          echo "===== logs for unhealthy / restarting / exited containers ====="
          for c in $(docker ps -a --format '{{.Names}}|{{.Status}}' | grep -iE 'Restarting|Exited|unhealthy' | cut -d'|' -f1); do
            echo "----- $c -----"
            docker logs --tail 40 "$c" 2>&1 | tail -40
          done
          echo ""
          echo "===== compose project/dir/files for out-of-tree services ====="
          for c in marketiz-api marketiz-web marketiz-worker travltime-api strategiz-ai-signal-prod; do
            printf '%s\t' "$c"
            docker inspect "$c" --format 'project={{index .Config.Labels "com.docker.compose.project"}} svc={{index .Config.Labels "com.docker.compose.service"}} dir={{index .Config.Labels "com.docker.compose.project.working_dir"}} files={{index .Config.Labels "com.docker.compose.project.config_files"}}' 2>/dev/null || echo "(not found)"
          done
