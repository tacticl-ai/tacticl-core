# Production Environment
server.port=8080
logging.level.io.strategiz.social=WARN

# Anthropic (OAuth tokens delegated to strategiz which manages rotation)
anthropic.direct.enabled=true
anthropic.direct.oauth-vault-context=strategiz

# OpenAI
openai.direct.enabled=true

# Grok
grok.direct.enabled=true

# Brave Search
tacticl.brave-search.enabled=true

# Jina Reader
tacticl.jina.enabled=true

# Vault Production (tacticl's own context)
cidadel.vault.enabled=true
cidadel.vault.address=${STRATEGIZ_VAULT_ADDRESS:https://cidadel-vault-908167426173.us-east1.run.app}
cidadel.vault.context=tacticl
spring.cloud.vault.uri=${STRATEGIZ_VAULT_ADDRESS:https://cidadel-vault-908167426173.us-east1.run.app}
spring.cloud.vault.token=${VAULT_TOKEN:}

# Auth — Cookie config (prod: cross-origin, parent domain for cookie sharing)
app.cookie.domain=tacticl.ai
app.cookie.secure=true
app.cookie.same-site=None

# Auth — Passkey/WebAuthn
passkey.rpId=tacticl.ai
passkey.rpName=Tacticl

# Auth — OAuth redirect
oauth.frontend-url=https://auth.tacticl.ai
oauth.providers.google.redirect-uri=https://auth.tacticl.ai/auth/oauth/google/signin/callback
oauth.providers.google.signup-redirect-uri=https://auth.tacticl.ai/auth/oauth/google/signup/callback
oauth.providers.facebook.redirect-uri=https://auth.tacticl.ai/auth/oauth/facebook/signin/callback
oauth.providers.facebook.signup-redirect-uri=https://auth.tacticl.ai/auth/oauth/facebook/signup/callback
auth.product.onboarding-url=https://tacticl.ai/

# Auth — CORS (tacticl domains — regex patterns for CorsFilter)
cidadel.cors.allowed-origin-patterns=https://tacticl\\.ai,https://auth\\.tacticl\\.ai,https://auth-api\\.tacticl\\.ai

# WebSocket CORS
tacticl.websocket.allowed-origins=https://tacticl.ai,https://www.tacticl.ai,https://tacticl.io,https://www.tacticl.io

# Auth — Product branding
auth.product.brand-color=#6C63FF
app.frontend.url=https://tacticl.ai

# Cloud Browser Automation
tacticl.browser.enabled=true

# MongoDB (Spring Boot 4: spring.mongodb.uri, not spring.data.mongodb.uri)
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27017/tacticlDb}

# PDLC v2 — cidadel-ai-arbiter integration
pdlc.v2.enabled=true
pdlc.v2.arbiter.host=178.156.141.55
pdlc.v2.arbiter.port=50051
pdlc.v2.arbiter.tls=false
pdlc.v2.arbiter.registry-base-path=gs://tacticl-artifacts/agent-registry
pdlc.v2.callback-url=https://api.tacticl.ai/v1/internal/pipeline/callback

# Auth — Email/SMS
sendgrid.enabled=true
twilio.enabled=true
