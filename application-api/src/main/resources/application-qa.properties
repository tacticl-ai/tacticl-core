# QA Environment
server.port=8080
logging.level.io.strategiz.social=INFO

# Anthropic (OAuth tokens delegated to strategiz-qa which manages rotation)
anthropic.direct.enabled=true
anthropic.direct.oauth-vault-context=strategiz-qa

# OpenAI
openai.direct.enabled=true

# Grok
grok.direct.enabled=true

# Brave Search
tacticl.brave-search.enabled=true

# Jina Reader
tacticl.jina.enabled=true

# Telegram (QA)
tacticl.telegram.enabled=true
tacticl.telegram.bot-username=${TELEGRAM_BOT_USERNAME:tacticl_qa_bot}
tacticl.telegram.public-base-url=https://api-qa.tacticl.ai

# Whisper (QA) — server-side STT for Telegram voice + future /v1/agent/voice
tacticl.whisper.enabled=true

# Vault QA (tacticl's own context — internal Cidadel Vault on Hetzner)
cidadel.vault.enabled=true
cidadel.vault.address=${VAULT_ADDR:http://vault:8200}
cidadel.vault.context=tacticl-qa
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.token=${VAULT_TOKEN:}

# Auth — Cookie config (QA: cross-origin between auth frontend and main app)
app.cookie.secure=true
app.cookie.same-site=None

# Auth — Passkey/WebAuthn
passkey.rpId=tacticl.ai
passkey.rpName=Tacticl QA

# Auth — OAuth redirect
oauth.frontend-url=https://auth.tacticl.ai
oauth.providers.google.redirect-uri=https://auth.tacticl.ai/auth/oauth/google/signin/callback
oauth.providers.google.signup-redirect-uri=https://auth.tacticl.ai/auth/oauth/google/signup/callback
oauth.providers.facebook.redirect-uri=https://auth.tacticl.ai/auth/oauth/facebook/signin/callback
oauth.providers.facebook.signup-redirect-uri=https://auth.tacticl.ai/auth/oauth/facebook/signup/callback
auth.product.onboarding-url=https://tacticl.ai/

# Auth — CORS (tacticl domains — regex patterns for CorsFilter)
cidadel.cors.allowed-origin-patterns=https://tacticl\\.ai,https://auth\\.tacticl\\.ai

# WebSocket CORS
tacticl.websocket.allowed-origins=https://tacticl.ai,https://auth.tacticl.ai,http://localhost:5173

# Auth — Product branding
auth.product.brand-color=#6C63FF
app.frontend.url=https://tacticl.ai

# Cloud Browser Automation
tacticl.browser.enabled=true

# Auth — Email/SMS
sendgrid.enabled=true
twilio.enabled=false

# PDLC v2 — cidadel-ai-arbiter integration
pdlc.v2.enabled=true
pdlc.v2.arbiter.host=cidadel-arbiter-qa
pdlc.v2.arbiter.port=50052
pdlc.v2.arbiter.tls=false
# NOTE: registry-base-path is sent to arbiter via gRPC but the arbiter
# uses its own AGENT_REGISTRY_PATH env var (/agent-registry = /opt/cidadel/agent-registry on host).
# Sync registry via: bash scripts/sync-agent-registry.sh
pdlc.v2.arbiter.registry-base-path=/agent-registry
pdlc.v2.callback-url=http://tacticl-api-qa:8080/v1/internal/pipeline/callback
# pdlc.v2.callback.secret — Set in Vault (secret/tacticl-qa/pdlc-callback-secret); must match arbiter's configured secret
pdlc.v2.callback.secret=${PDLC_CALLBACK_SECRET:}
