spring.application.name=tacticl-core
spring.profiles.active=local

# cidadel 0.4.x: SecretManagerAutoConfig @Bean conflicts with VaultSecretService @Service
# Allow overriding so the AutoConfig's @Primary bean wins
spring.main.allow-bean-definition-overriding=true
server.port=8080

# Vault
spring.cloud.vault.enabled=true
spring.cloud.vault.uri=http://localhost:8200
cidadel.vault.enabled=true
cidadel.vault.context=tacticl

# Auth
cidadel.authorization.access-token-cookie=tacticl-access-token
cidadel.authorization.expected-issuer=cidadel.io
cidadel.authorization.expected-audience=tacticl

# MongoDB (Spring Boot 4: spring.data.mongodb.* deprecated → spring.mongodb.*)
spring.mongodb.uri=mongodb://localhost:27017/tacticlDb
spring.mongodb.auto-index-creation=true

# LLM Routing
llm.router.default-model=claude-haiku-4-5
llm.agent.generation-model=claude-sonnet-4-5

# WebSocket CORS
tacticl.websocket.allowed-origins=http://localhost:5173,http://localhost:3000

# Feature flags
tacticl.brave-search.enabled=true
tacticl.jina.enabled=true
tacticl.github.enabled=true
tacticl.google.enabled=true
tacticl.telegram.enabled=false
tacticl.whisper.enabled=false
tacticl.discord.enabled=false
tacticl.voice.enabled=false

# Telegram (values loaded from Vault when enabled)
tacticl.telegram.base-url=https://api.telegram.org
tacticl.telegram.webhook-path=/v1/telegram/webhook
tacticl.telegram.rate-limit-per-minute=30
tacticl.telegram.link-token-ttl-minutes=15
tacticl.telegram.bot-username=
tacticl.telegram.public-base-url=
tacticl.telegram.outbound.capacity=200
tacticl.telegram.outbound.drain-ms=50
tacticl.telegram.status-debounce-ms=10000

# Discord (Interactions webhook — dormant by default; secrets loaded from Vault when enabled)
# Vault refs (read by DiscordVaultConfig): discord-public-key, discord-bot-token, discord-application-id
tacticl.discord.base-url=https://discord.com/api/v10
tacticl.discord.interactions-path=/v1/discord/interactions
tacticl.discord.rate-limit-per-minute=50
tacticl.discord.interaction-dedup-ttl-seconds=600
tacticl.discord.link-token-ttl-minutes=15
tacticl.discord.command-guild-id=
tacticl.discord.public-key=
tacticl.discord.bot-token=
tacticl.discord.application-id=

# Pipeline ingress entry-point registry (EntryPointSeeder upserts these on boot; empty = dormant).
# Each row maps an inbound transport key onto {product, repo, playbook, admins}. The playbook is
# the arbiter pipeline NAME — the arbiter firewalls this to `pdlc-fix` (bugs) | `pdlc-feature`
# (features); anything else is rejected. An alert channel routes to `pdlc-fix`; the admin who
# clicks "Send to PDLC" must be listed in admin-user-ids.
# Define real rows in application-{profile}.properties. Example (commented — fill in real ids):
#   Discord alert channel -> pdlc-fix (lean: investigate + fix + open PR, no full-PDLC rigor):
# tacticl.ingress.entry-points[0].channel=DISCORD
# tacticl.ingress.entry-points[0].external-key=<guildId>:<sevChannelId>
# tacticl.ingress.entry-points[0].product-id=tacticl
# tacticl.ingress.entry-points[0].repo-url=https://github.com/<owner>/<repo>.git
# tacticl.ingress.entry-points[0].playbook=pdlc-fix
# tacticl.ingress.entry-points[0].admin-user-ids[0]=<tacticlUserId>
# tacticl.ingress.entry-points[0].cost-ceiling-usd=10
#   Voice surface -> default for the VOICE channel (pdlc-feature for build-style requests):
# tacticl.ingress.entry-points[1].channel=VOICE
# tacticl.ingress.entry-points[1].external-key=voice-default
# tacticl.ingress.entry-points[1].product-id=tacticl
# tacticl.ingress.entry-points[1].repo-url=https://github.com/<owner>/<repo>.git
# tacticl.ingress.entry-points[1].playbook=pdlc-feature
# tacticl.ingress.entry-points[1].admin-user-ids[0]=<tacticlUserId>
# tacticl.ingress.entry-points[1].default-for-channel=true

# Whisper (OpenAI transcription — used when tacticl.whisper.enabled=true)
tacticl.whisper.base-url=https://api.openai.com
tacticl.whisper.model=whisper-1
tacticl.whisper.rate-limit-per-minute=60

# Voice command center — DORMANT by default (the enable flag is in the cluster
# above). Flipping tacticl.voice.enabled=true activates: the WebSocket transport
# (/v1/voice) + token endpoint (service-voice), the turn orchestration
# (business-voice), and the Deepgram/ElevenLabs client legs. Deepgram + ElevenLabs
# API keys are NEVER set here — they load from Vault (secret/tacticl/deepgram,
# secret/tacticl/elevenlabs, key 'api-key') by the client Vault configs when their
# own enable flags are on. Voice requires both.
# WebSocket transport path the browser opens (token rides in ?token=).
tacticl.voice.ws-path=/v1/voice
# Lifetime of a minted voice session token (the access PASETO is exchanged for
# this short-lived opaque token at POST /v1/voice/token). Mirrors link-token-ttl.
tacticl.voice.token-ttl-seconds=120
# Optional absolute wss:// URL handed back to the browser; blank → client default.
tacticl.voice.public-ws-url=
# Optional ElevenLabs voice id override; blank → client-configured default voice.
tacticl.voice.voice-id=
# Anthropic model the in-JVM FALLBACK conversation engine speaks with (Haiku → low
# voice latency). Unused once the arbiter brain is the sole engine.
tacticl.voice.conversation-model=claude-haiku-4-5-20251001
# Conversation brain selection. Left UNSET here so matchIfMissing governs the default
# (→ in-JVM Anthropic fallback engine). application-prod.properties sets it true so the
# analyst persona (skills + multi-provider routing) runs in the arbiter ConverseTurn
# service and tacticl-core just relays the turn. (Avoid setting false here — a base value
# can shadow the profile override and pin the fallback on.)
# Deepgram (streaming STT) + ElevenLabs (streaming TTS) — gated independently;
# voice needs both. Keys load from Vault (see above) when enabled.
tacticl.deepgram.enabled=false
tacticl.elevenlabs.enabled=false
# DOWN audio is forced to raw 16 kHz mono PCM16 by ElevenLabsTtsBridge so it
# matches the mic format — no audio_format negotiation frame needed.
tacticl.elevenlabs.default-output-format=pcm_16000

# Multipart limits — sized for ~30s OGG/Opus voice notes via /v1/agent/voice.
# Spring Boot defaults are 1MB/10MB which reject most real voice clips
# before the controller is even invoked.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# GitHub OAuth (values loaded from Vault at runtime)
tacticl.github.client-id=${GITHUB_CLIENT_ID:placeholder}
tacticl.github.client-secret=${GITHUB_CLIENT_SECRET:placeholder}

# Actuator — health probes (Kubernetes-style liveness/readiness) for Compose healthchecks.
# Without these, /actuator/health aggregates ALL indicators and returns 5xx whenever any
# external dependency is degraded — which makes the container healthcheck lie about JVM state.
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,mongo
management.endpoint.health.show-details=when-authorized
