# Production Environment
server.port=8080
logging.level.io.strategiz.social=WARN

# Anthropic (OAuth tokens delegated to strategiz which manages rotation)
anthropic.direct.enabled=true
anthropic.direct.oauth-vault-context=strategiz

# OpenAI
openai.direct.enabled=true

# Grok
grok.direct.enabled=true

# Brave Search
tacticl.brave-search.enabled=true

# Jina Reader
tacticl.jina.enabled=true

# Vault Production (tacticl's own context)
cidadel.vault.enabled=true
cidadel.vault.address=${STRATEGIZ_VAULT_ADDRESS:https://strategiz-vault-43628135674.us-east1.run.app}
cidadel.vault.context=tacticl
spring.cloud.vault.uri=${STRATEGIZ_VAULT_ADDRESS:https://strategiz-vault-43628135674.us-east1.run.app}
spring.cloud.vault.token=${VAULT_TOKEN:}

# Auth — Cookie config (prod: cross-origin, parent domain for cookie sharing)
app.cookie.domain=tacticl.ai
app.cookie.secure=true
app.cookie.same-site=None

# Auth — Passkey/WebAuthn
passkey.rpId=tacticl.ai
passkey.rpName=Tacticl

# Auth — OAuth redirect
oauth.frontend-url=https://auth.tacticl.ai
auth.product.onboarding-url=https://tacticl.ai/

# Auth — CORS (tacticl domains)
strategiz.cors.allowed-origins=https://tacticl.ai,https://auth.tacticl.ai,https://tacticl.web.app,https://tacticl-auth.web.app

# WebSocket CORS
tacticl.websocket.allowed-origins=https://tacticl.io,https://www.tacticl.io

# Auth — Product branding
auth.product.brand-color=#6C63FF
app.frontend.url=https://tacticl.ai

# Cloud Browser Automation
tacticl.browser.enabled=true

# Auth — Email/SMS
sendgrid.enabled=true
twilio.enabled=true
