# QA Environment
server.port=8080
logging.level.io.strategiz.social=INFO

# Anthropic (OAuth tokens delegated to strategiz-qa which manages rotation)
anthropic.direct.enabled=true
anthropic.direct.oauth-vault-context=strategiz-qa

# OpenAI
openai.direct.enabled=true

# Grok
grok.direct.enabled=true

# Brave Search
tacticl.brave-search.enabled=true

# Jina Reader
tacticl.jina.enabled=true

# Vault QA (tacticl's own context, separate from strategiz)
strategiz.vault.enabled=true
strategiz.vault.address=${STRATEGIZ_VAULT_ADDRESS:https://strategiz-vault-43628135674.us-east1.run.app}
strategiz.vault.context=tacticl-qa
spring.cloud.vault.uri=${STRATEGIZ_VAULT_ADDRESS:https://strategiz-vault-43628135674.us-east1.run.app}
spring.cloud.vault.token=${VAULT_TOKEN:}

# Auth — Cookie config (QA: cross-origin between auth frontend and main app)
app.cookie.secure=true
app.cookie.same-site=None

# Auth — Passkey/WebAuthn
passkey.rpId=tacticl.ai
passkey.rpName=Tacticl QA

# Auth — OAuth redirect
oauth.frontend-url=https://tacticl.ai
auth.product.onboarding-url=https://tacticl.ai/

# Auth — CORS (tacticl domains)
strategiz.cors.allowed-origins=https://tacticl.ai,https://auth.tacticl.ai,https://tacticl-web.web.app,https://tacticl-auth.web.app

# WebSocket CORS
tacticl.websocket.allowed-origins=https://tacticl-qa.web.app,https://tacticl-qa.firebaseapp.com,http://localhost:5173

# Auth — Email/SMS
sendgrid.enabled=true
twilio.enabled=false
