# Tacticl Core
spring.application.name=tacticl-core
spring.main.allow-bean-definition-overriding=true
server.port=8080

# Profiles
spring.profiles.active=local

# Vault (separate from Strategiz — tacticl has its own context)
spring.cloud.vault.enabled=true
spring.cloud.vault.uri=http://localhost:8200
spring.cloud.vault.authentication=token
strategiz.vault.enabled=true
strategiz.vault.context=tacticl

# Firestore (shared project)
spring.cloud.gcp.firestore.enabled=true

# Multipart (audio uploads for transcription)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Logging
logging.level.io.strategiz.social=DEBUG
logging.level.org.springframework.web=INFO

# Anthropic Direct API
anthropic.direct.enabled=true
anthropic.direct.max-tokens=4096
anthropic.direct.temperature=0.3
anthropic.direct.oauth-vault-context=strategiz

# OpenAI Direct API
openai.direct.enabled=true
openai.direct.max-tokens=4096
openai.direct.temperature=0.3

# Grok Direct API
grok.direct.enabled=true
grok.direct.max-tokens=4096
grok.direct.temperature=0.3

# Brave Search (web search)
tacticl.brave-search.enabled=true

# Jina Reader (web browsing)
tacticl.jina.enabled=true

# Social platform OAuth (loaded from Vault)
tacticl.twitter.enabled=true
tacticl.linkedin.enabled=true
tacticl.instagram.enabled=true
tacticl.google.enabled=true
tacticl.github.enabled=true

# LLM Router
llm.router.default-model=claude-haiku-4-5
llm.agent.routing-model=claude-haiku-4-5
llm.agent.generation-model=claude-sonnet-4-5

# Auth — Cookie config (local dev)
app.cookie.domain=localhost
app.cookie.secure=false
app.cookie.same-site=Lax

# Auth — Passkey/WebAuthn (local dev)
passkey.rpId=localhost
passkey.rpName=Tacticl Dev

# Auth — OAuth redirect (local dev)
oauth.frontend-url=http://localhost:5173
auth.product.onboarding-url=http://localhost:5173/

# Auth — Product branding
auth.product.name=Tacticl

# Auth — Email/SMS (disabled for local dev)
sendgrid.enabled=false
twilio.enabled=false

# Firebase
firebase.database.url=https://tacticl-default-rtdb.firebaseio.com
firebase.storage.bucket=tacticl.firebasestorage.app
spring.cloud.gcp.project-id=tacticl

# Cache
spring.cache.type=simple
