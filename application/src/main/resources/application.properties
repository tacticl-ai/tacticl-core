# Tacticl Core
spring.application.name=tacticl-core
spring.main.allow-bean-definition-overriding=true
server.port=8080

# Profiles
spring.profiles.active=local

# Vault (separate from Strategiz — tacticl has its own context)
spring.cloud.vault.enabled=true
spring.cloud.vault.uri=http://localhost:8200
spring.cloud.vault.authentication=token
strategiz.vault.enabled=true
strategiz.vault.context=tacticl

# Firestore (shared project)
spring.cloud.gcp.firestore.enabled=true

# Multipart (audio uploads for transcription)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Logging
logging.level.io.strategiz.social=DEBUG
logging.level.org.springframework.web=INFO

# Anthropic Direct API
anthropic.direct.enabled=true
anthropic.direct.max-tokens=4096
anthropic.direct.temperature=0.3

# OpenAI Direct API
openai.direct.enabled=true
openai.direct.max-tokens=4096
openai.direct.temperature=0.3

# Grok Direct API
grok.direct.enabled=true
grok.direct.max-tokens=4096
grok.direct.temperature=0.3

# Brave Search (web search)
tacticl.brave-search.enabled=true

# Jina Reader (web browsing)
tacticl.jina.enabled=true

# LLM Router
llm.router.default-model=claude-haiku-4-5
llm.agent.routing-model=claude-haiku-4-5
llm.agent.generation-model=claude-sonnet-4-5
