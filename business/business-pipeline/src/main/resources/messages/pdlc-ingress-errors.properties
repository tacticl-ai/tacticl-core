# PDLC Ingress Error Messages (business-pipeline)
# Format: [error-key].[property] = [value]
# Properties: code, message, developer, more-info
# Developer message placeholders: {0} = module name, {1..n} = custom parameters

pdlc-ingress-entry-point-not-found.code=PDLC_INGRESS_ENTRY_POINT_NOT_FOUND
pdlc-ingress-entry-point-not-found.message=This channel is not configured for the pipeline.
pdlc-ingress-entry-point-not-found.developer=No active EntryPoint matched in module: {0}, channel: {1}, externalKey: {2}
pdlc-ingress-entry-point-not-found.more-info=pdlc-ingress/entry-point-not-found

pdlc-ingress-not-authorized.code=PDLC_INGRESS_NOT_AUTHORIZED
pdlc-ingress-not-authorized.message=You are not authorized to trigger pipelines from this channel.
pdlc-ingress-not-authorized.developer=User not in EntryPoint admin set in module: {0}, tacticlUserId: {1}, entryPointId: {2}
pdlc-ingress-not-authorized.more-info=pdlc-ingress/not-authorized

pdlc-ingress-unlinked-identity.code=PDLC_INGRESS_UNLINKED_IDENTITY
pdlc-ingress-unlinked-identity.message=Link your account before using this command.
pdlc-ingress-unlinked-identity.developer=Channel identity did not resolve to a linked tacticl user in module: {0}, channel: {1}
pdlc-ingress-unlinked-identity.more-info=pdlc-ingress/unlinked-identity

pdlc-ingress-invalid-request.code=PDLC_INGRESS_INVALID_REQUEST
pdlc-ingress-invalid-request.message=The request was missing required information.
pdlc-ingress-invalid-request.developer=Invalid ingress request in module: {0}, kind: {1}, detail: {2}
pdlc-ingress-invalid-request.more-info=pdlc-ingress/invalid-request
