# Voice command-center error messages (business-voice)
# Format: [error-key].[property] = [value]
# Properties: code, message, developer, more-info
# Developer message placeholders: {0} = module name, {1..n} = custom parameters

voice-empty-transcript.code=VOICE_EMPTY_TRANSCRIPT
voice-empty-transcript.message=I did not catch anything to act on.
voice-empty-transcript.developer=Final transcript was empty or blank in module: {0}, sessionId: {1}
voice-empty-transcript.more-info=voice/empty-transcript

voice-unresolvable-decision.code=VOICE_UNRESOLVABLE_DECISION
voice-unresolvable-decision.message=That checkpoint is no longer awaiting a decision.
voice-unresolvable-decision.developer=Decision frame referenced an unresolvable checkpoint in module: {0}, checkpointId: {1}
voice-unresolvable-decision.more-info=voice/unresolvable-decision

voice-stt-failed.code=VOICE_STT_FAILED
voice-stt-failed.message=Speech recognition is temporarily unavailable.
voice-stt-failed.developer=Deepgram STT leg failed in module: {0}, detail: {1}
voice-stt-failed.more-info=voice/stt-failed

voice-tts-failed.code=VOICE_TTS_FAILED
voice-tts-failed.message=Voice playback is temporarily unavailable.
voice-tts-failed.developer=ElevenLabs TTS leg failed in module: {0}, detail: {1}
voice-tts-failed.more-info=voice/tts-failed
