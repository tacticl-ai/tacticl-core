availableSecrets:
  secretManager:
    - versionName: projects/tacticl/secrets/github-packages-token/versions/latest
      env: 'GITHUB_TOKEN'

steps:
  # Step 0: Clone cidadel-core, publish to mavenLocal, then build tacticl-core
  # All shared infrastructure (framework, auth, LLM clients) comes from cidadel-core
  - name: 'eclipse-temurin:25-jdk-noble'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y git
        set -eo pipefail
        GH_TOKEN=$(echo -n "$${GITHUB_TOKEN}" | tr -d '[:space:]')
        export GITHUB_TOKEN="$${GH_TOKEN}"
        export GITHUB_ACTOR=cuztomizer
        echo "=== Cloning cidadel-core ==="
        git clone --depth 1 "https://x-access-token:$${GH_TOKEN}@github.com/cuztomizer/cidadel-core.git" /tmp/cidadel-core
        cd /tmp/cidadel-core
        chmod +x gradlew
        ./gradlew publishToMavenLocal -x test --no-daemon
        echo "=== Cidadel-core installed to mavenLocal ==="
        echo "=== Building tacticl-core with Gradle ==="
        cd /workspace
        chmod +x gradlew
        ./gradlew build -x test --no-daemon
        echo "=== Gradle build succeeded ==="
    secretEnv: ['GITHUB_TOKEN']

  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-east1-docker.pkg.dev/tacticl/tacticl-core/tacticl-api:$BUILD_ID', '.']

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/tacticl/tacticl-core/tacticl-api:$BUILD_ID']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tacticl-core'
      - '--image=us-east1-docker.pkg.dev/tacticl/tacticl-core/tacticl-api:$BUILD_ID'
      - '--region=us-east1'
      - '--platform=managed'
      - '--project=tacticl'
      - '--memory=8Gi'
      - '--cpu=4'
      - '--min-instances=0'
      - '--set-env-vars=SPRING_PROFILES_ACTIVE=prod,STRATEGIZ_VAULT_ADDRESS=https://cidadel-vault-908167426173.us-east1.run.app,BROWSER_ENABLED=true,AUTH_GOOGLE_REDIRECT_URI=https://auth.tacticl.ai/auth/oauth/google/signin/callback,AUTH_FACEBOOK_REDIRECT_URI=https://auth.tacticl.ai/auth/oauth/facebook/signin/callback'
      - '--set-secrets=VAULT_TOKEN=vault-root-token:latest'
      - '--allow-unauthenticated'
      - '--timeout=3600'
      - '--session-affinity'
      - '--cpu-boost'

timeout: '1200s'
