availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-packages-token/versions/latest
      env: 'GITHUB_TOKEN'

steps:
  # Step 0: Build with Gradle using Java 25 JDK
  - name: 'eclipse-temurin:25-jdk-noble'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -eo pipefail
        GH_TOKEN=$(echo -n "$${GITHUB_TOKEN}" | tr -d '[:space:]')
        export GITHUB_TOKEN="$${GH_TOKEN}"
        export GITHUB_ACTOR=cuztomizer
        chmod +x gradlew
        ./gradlew build -x test --no-daemon
    secretEnv: ['GITHUB_TOKEN']

  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-east1-docker.pkg.dev/$PROJECT_ID/tacticl-core/tacticl-core:$BUILD_ID', '.']

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/tacticl-core/tacticl-core:$BUILD_ID']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tacticl-core'
      - '--image=us-east1-docker.pkg.dev/$PROJECT_ID/tacticl-core/tacticl-core:$BUILD_ID'
      - '--region=us-east1'
      - '--platform=managed'
      - '--memory=4Gi'
      - '--set-env-vars=SPRING_PROFILES_ACTIVE=prod,STRATEGIZ_VAULT_ADDRESS=https://strategiz-vault-43628135674.us-east1.run.app'
      - '--set-secrets=VAULT_TOKEN=vault-root-token:latest'
      - '--no-traffic'
      - '--timeout=3600'
      - '--session-affinity'

  # Step 4: Migrate traffic to new revision once healthy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        NEW_REV=$$(gcloud run revisions list --service=tacticl-core --region=us-east1 --platform=managed --sort-by=~createTime --limit=1 --format='value(name)')
        echo "Migrating traffic to revision: $$NEW_REV"
        gcloud run services update-traffic tacticl-core --to-revisions=$$NEW_REV=100 --region=us-east1 --platform=managed

timeout: '1200s'
