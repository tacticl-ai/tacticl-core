# Agent Service Error Messages
# Format: [error-key].[property] = [value]
# Properties: code, message, developer, more-info
# Developer message placeholders: {0} = module name, {1..n} = custom parameters

# Command Errors
agent-command-failed.code=AGENT_COMMAND_FAILED
agent-command-failed.message=Failed to execute the agent command
agent-command-failed.developer=Agent command failed in module: {0}, error: {1}
agent-command-failed.more-info=agent/command-failed

# Confirmation Errors
agent-confirmation-not-found.code=AGENT_CONFIRMATION_NOT_FOUND
agent-confirmation-not-found.message=The action confirmation was not found
agent-confirmation-not-found.developer=Confirmation not found in module: {0}, confirmationId: {1}
agent-confirmation-not-found.more-info=agent/confirmation-not-found

agent-confirmation-expired.code=AGENT_CONFIRMATION_EXPIRED
agent-confirmation-expired.message=The action confirmation has expired
agent-confirmation-expired.developer=Confirmation expired in module: {0}, confirmationId: {1}, expiredAt: {2}
agent-confirmation-expired.more-info=agent/confirmation-expired

agent-unauthorized-confirmation.code=AGENT_UNAUTHORIZED_CONFIRMATION
agent-unauthorized-confirmation.message=You are not authorized to confirm this action
agent-unauthorized-confirmation.developer=Unauthorized confirmation attempt in module: {0}, confirmationId: {1}, userId: {2}
agent-unauthorized-confirmation.more-info=agent/unauthorized-confirmation
