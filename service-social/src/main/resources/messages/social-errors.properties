# Social Service Error Messages
# Format: [error-key].[property] = [value]
# Properties: code, message, developer, more-info
# Developer message placeholders: {0} = module name, {1..n} = custom parameters

# Post Errors
social-post-not-found.code=SOCIAL_POST_NOT_FOUND
social-post-not-found.message=The requested post was not found
social-post-not-found.developer=Post not found in module: {0}, postId: {1}
social-post-not-found.more-info=social/post-not-found

social-post-invalid-state.code=SOCIAL_POST_INVALID_STATE
social-post-invalid-state.message=The post is in an invalid state for this operation
social-post-invalid-state.developer=Invalid post state in module: {0}, postId: {1}, currentState: {2}, requiredState: {3}
social-post-invalid-state.more-info=social/post-invalid-state

# Integration Errors
social-integration-not-found.code=SOCIAL_INTEGRATION_NOT_FOUND
social-integration-not-found.message=The social media integration was not found
social-integration-not-found.developer=Integration not found in module: {0}, integrationId: {1}
social-integration-not-found.more-info=social/integration-not-found

social-oauth-failed.code=SOCIAL_OAUTH_FAILED
social-oauth-failed.message=Failed to authenticate with the social media platform
social-oauth-failed.developer=OAuth failed in module: {0}, platform: {1}, error: {2}
social-oauth-failed.more-info=social/oauth-failed

social-platform-not-supported.code=SOCIAL_PLATFORM_NOT_SUPPORTED
social-platform-not-supported.message=The specified social media platform is not supported
social-platform-not-supported.developer=Unsupported platform in module: {0}, platform: {1}
social-platform-not-supported.more-info=social/platform-not-supported
